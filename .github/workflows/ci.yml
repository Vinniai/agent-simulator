name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fork-only boundary (ADR-0001)
        run: ./scripts/check-fork-boundary.sh

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
