name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -c release

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Generate lcov report
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          # The test bundle is named after the package ("agent-sim" →
          # "agent-simPackageTests.xctest"); discover it instead of hardcoding
          # the sanitized name, which differs across SwiftPM versions.
          XCTEST_BUNDLE=$(find "$BIN_PATH" -maxdepth 1 -name "*.xctest" | head -1)
          if [ -z "$XCTEST_BUNDLE" ]; then
            echo "No .xctest bundle found under $BIN_PATH" >&2
            exit 1
          fi
          XCTEST="$XCTEST_BUNDLE/Contents/MacOS/$(basename "$XCTEST_BUNDLE" .xctest)"
          PROFDATA="$BIN_PATH/codecov/default.profdata"
          # Excluded: IO / 3rd-party-SDK shims (CoreSimulator, SimulatorKit,
          # IOKit HID, Hummingbird, VideoToolbox, CoreImage, IOSurface,
          # stdin/stdout) and the thin command-layer files that do nothing
          # but wire those shims together — they need a booted simulator or
          # live socket to exercise meaningfully.
          xcrun llvm-cov export "$XCTEST" \
            -instr-profile "$PROFDATA" \
            -format=lcov \
            -ignore-filename-regex=".build|Tests|Resources|Mock|Infrastructure/Server/|Infrastructure/Simulator/|Infrastructure/Input/|Infrastructure/Screen/|Infrastructure/Stream/|Infrastructure/Chrome/PDFRasterizer|App/Commands/|App/Logger" \
            > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Vinniai/agent-sim
          files: coverage.lcov
          # Coverage upload is informational — a missing token or Codecov
          # outage must not fail the build.
          fail_ci_if_error: false
