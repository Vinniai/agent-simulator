name: Publish to npm

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve version (strip leading v)
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Guard NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set — cannot publish to npm."
            exit 1
          fi

      - name: Set package version to match the release tag
        working-directory: npm
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # The published tarball ships only the bin shim + postinstall (see
      # the "files" field); the native binary is fetched on the user's
      # machine at install time. postinstall does NOT run during publish.
      - name: Publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
