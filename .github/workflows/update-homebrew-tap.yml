name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          BASE_URL="https://github.com/josh-vincent/agent-sim/releases/download/${VERSION}"
          CHECKSUMS=$(curl -sfL "${BASE_URL}/agent-sim_${VERSION}_checksums.txt")
          SHA256_ARM64=$(echo "$CHECKSUMS" | grep "macOS_arm64" | awk '{print $1}')

          if [[ ! "$SHA256_ARM64" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid arm64 checksum: '${SHA256_ARM64}'"
            exit 1
          fi

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/josh-vincent/homebrew-tap.git homebrew-tap

          mkdir -p homebrew-tap/Formula
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__SHA256_ARM64__/${SHA256_ARM64}/g" \
              .github/homebrew/agent-sim.rb.template > homebrew-tap/Formula/agent-sim.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-sim.rb
          git commit -m "Update agent-sim to ${VERSION}" || echo "No changes to commit"
          git push
