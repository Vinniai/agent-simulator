coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 1%

# Mirror the lcov exclusions in .github/workflows/ci.yml: IO / 3rd-party
# shims around CoreSimulator, SimulatorKit, IOKit HID, Hummingbird,
# VideoToolbox, CoreImage, IOSurface and stdin/stdout sinks need a booted
# simulator or live socket to exercise — and the thin command-layer files
# that do nothing but wire those shims together follow the same rule.
ignore:
  - "Sources/AgentSim/Resources/**"
  - "Sources/AgentSim/Infrastructure/Server/**"
  - "Sources/AgentSim/Infrastructure/Simulator/**"
  - "Sources/AgentSim/Infrastructure/Input/**"
  - "Sources/AgentSim/Infrastructure/Screen/**"
  - "Sources/AgentSim/Infrastructure/Stream/**"
  - "Sources/AgentSim/Infrastructure/Chrome/PDFRasterizer.swift"
  - "Sources/AgentSim/App/Commands/**"
  - "Sources/AgentSim/App/Logger.swift"
  - "Tests/**"
